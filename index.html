<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>RTS Command</title>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#141928">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="apple-touch-icon" href="/icon-192.png">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #000; font-family: 'Segoe UI', Tahoma, sans-serif; color: #e0e0e0; }
    #game-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }

    /* Selection box */
    #selection-box {
      position: absolute; border: 1px solid #0f0; background: rgba(0, 255, 0, 0.1);
      pointer-events: none; display: none; z-index: 10;
    }

    /* Top bar */
    #top-bar {
      position: absolute; top: 0; left: 0; right: 0; height: 36px;
      background: linear-gradient(180deg, rgba(20,25,40,0.95), rgba(10,12,20,0.9));
      border-bottom: 1px solid rgba(100,150,255,0.2);
      display: flex; align-items: center; padding: 0 16px; gap: 24px; z-index: 20;
      font-size: 14px; user-select: none;
    }
    .resource-item { display: flex; align-items: center; gap: 6px; }
    .resource-icon { width: 16px; height: 16px; border-radius: 3px; }
    .mineral-icon { background: linear-gradient(135deg, #4fc3f7, #0288d1); }
    .gas-icon { background: linear-gradient(135deg, #66bb6a, #2e7d32); }
    .supply-icon { background: linear-gradient(135deg, #ffa726, #e65100); }
    .resource-value { font-weight: 600; min-width: 48px; }

    /* Bottom panel */
    #bottom-panel {
      position: absolute; bottom: 0; left: 200px; right: 0; height: 160px;
      background: linear-gradient(0deg, rgba(20,25,40,0.95), rgba(10,12,20,0.9));
      border-top: 1px solid rgba(100,150,255,0.2);
      display: flex; z-index: 20; user-select: none;
    }
    #unit-info {
      width: 240px; padding: 12px; border-right: 1px solid rgba(100,150,255,0.15);
      display: flex; flex-direction: column; gap: 4px;
    }
    #unit-info .name { font-size: 15px; font-weight: 600; color: #90caf9; }
    #unit-info .stat { font-size: 12px; color: #aaa; }
    .hp-bar { width: 100%; height: 6px; background: #333; border-radius: 3px; margin-top: 4px; }
    .hp-bar-fill { height: 100%; background: #4caf50; border-radius: 3px; transition: width 0.2s; }

    #action-buttons {
      flex: 1; padding: 12px; display: flex; flex-wrap: wrap; gap: 6px; align-content: flex-start;
    }
    .action-btn {
      width: 52px; height: 52px; background: rgba(40,50,80,0.8); border: 1px solid rgba(100,150,255,0.3);
      border-radius: 4px; cursor: pointer; display: flex; flex-direction: column;
      align-items: center; justify-content: center; font-size: 10px; color: #ccc;
      transition: all 0.15s;
    }
    .action-btn:hover { background: rgba(60,80,140,0.9); border-color: rgba(100,150,255,0.6); }
    .action-btn .icon { font-size: 20px; line-height: 1; }
    .action-btn .label { font-size: 9px; margin-top: 2px; }
    .action-btn.disabled { opacity: 0.4; cursor: not-allowed; }
    .action-btn.active { background: rgba(40,120,40,0.9); border-color: rgba(80,255,80,0.8); box-shadow: 0 0 6px rgba(80,255,80,0.4); }

    /* Minimap */
    #minimap-container {
      position: absolute; bottom: 0; left: 0; width: 200px; height: 160px;
      background: rgba(10,12,20,0.95); border: 1px solid rgba(100,150,255,0.2);
      border-left: none; border-bottom: none; z-index: 20;
    }
    #minimap { width: 100%; height: 100%; image-rendering: pixelated; }

    /* Build mode indicator */
    #build-mode {
      position: absolute; top: 44px; left: 50%; transform: translateX(-50%);
      background: rgba(255,150,0,0.9); color: #000; padding: 4px 16px;
      border-radius: 4px; font-size: 13px; font-weight: 600;
      display: none; z-index: 25;
    }

    /* Tooltip */
    .tooltip {
      position: absolute; background: rgba(20,25,40,0.95); border: 1px solid rgba(100,150,255,0.3);
      padding: 6px 10px; border-radius: 4px; font-size: 12px; pointer-events: none;
      display: none; z-index: 30; white-space: nowrap;
    }

    /* Mobile touch move button */
    #touch-move-btn {
      display: none; position: absolute; bottom: 175px; right: 16px;
      width: 56px; height: 56px; border-radius: 50%;
      background: rgba(255,100,50,0.85); border: 2px solid rgba(255,200,100,0.6);
      color: #fff; font-size: 22px; font-weight: 700;
      z-index: 25; cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      display: flex; align-items: center; justify-content: center;
    }
    #touch-move-btn.active { background: rgba(50,200,100,0.85); border-color: rgba(100,255,150,0.6); }

    /* Shared buttons (debug, editor, sandbox) injected by sharedButtons.ts */

    /* Mobile: responsive UI */
    @media (max-width: 768px), (pointer: coarse) {
      #touch-move-btn { display: flex; }
      #debug-btn { display: block; }

      #top-bar { height: 44px; font-size: 16px; padding: 0 10px; gap: 14px; }
      .resource-icon { width: 20px; height: 20px; }
      .resource-value { font-size: 16px; }

      #bottom-panel { height: 120px; left: 130px; }
      #unit-info { width: 160px; padding: 8px; }
      #unit-info .name { font-size: 14px; }
      .action-btn { width: 46px; height: 46px; }

      #minimap-container { width: 130px; height: 120px; }

      #build-mode { top: 52px; font-size: 14px; }
    }

    @media (max-width: 480px) {
      #bottom-panel { left: 100px; height: 100px; }
      #minimap-container { width: 100px; height: 100px; }
      #unit-info { width: 120px; padding: 6px; }
      .action-btn { width: 40px; height: 40px; }
      .action-btn .icon { font-size: 16px; }
    }
  </style>
</head>
<body>
  <canvas id="game-canvas"></canvas>
  <div id="selection-box"></div>

  <div id="top-bar">
    <div class="resource-item">
      <div class="resource-icon mineral-icon"></div>
      <span class="resource-value" id="minerals">400</span>
    </div>
    <div class="resource-item">
      <div class="resource-icon gas-icon"></div>
      <span class="resource-value" id="gas">0</span>
    </div>
    <div class="resource-item">
      <div class="resource-icon supply-icon"></div>
      <span class="resource-value" id="supply">5/15</span>
    </div>
    <div style="flex:1"></div>
    <span id="fps" style="font-size:11px; color:#666;"></span>
  </div>

  <div id="bottom-panel">
    <div id="unit-info">
      <div class="name" id="selected-name">No selection</div>
      <div class="stat" id="selected-stats"></div>
      <div class="hp-bar" id="hp-bar-container" style="display:none">
        <div class="hp-bar-fill" id="hp-bar-fill"></div>
      </div>
      <div class="stat" id="selected-count"></div>
    </div>
    <div id="action-buttons"></div>
  </div>

  <div id="minimap-container">
    <canvas id="minimap"></canvas>
  </div>

  <div id="build-mode">Press ESC to cancel</div>
  <button id="deselect-btn" style="display:none;position:fixed;bottom:175px;right:16px;width:48px;height:48px;border-radius:50%;background:rgba(180,50,50,0.8);border:1px solid rgba(255,100,100,0.4);color:#fff;font-size:20px;z-index:100;cursor:pointer" title="Deselect all (ESC)">&#x2716;</button>
  <!-- Debug + navigation buttons injected by sharedButtons.ts -->

  <script type="module" src="/src/main.ts"></script>
  <script>if('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js')</script>
</body>
</html>
